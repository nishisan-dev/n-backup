name: Wiki Sync

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'

permissions:
  contents: write

concurrency:
  group: wiki-sync
  cancel-in-progress: true

jobs:
  sync-wiki:
    name: Sync wiki/ → GitHub Wiki
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone wiki repo
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git /tmp/wiki

      - name: Copy wiki files
        run: |
          cp wiki/*.md /tmp/wiki/

      - name: Check for changes
        id: diff
        run: |
          cd /tmp/wiki
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          cd /tmp/wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "sync: wiki updated from main (${{ github.sha }})"
          git push
